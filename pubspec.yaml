name: mygame
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.11.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.0.1
  intl: ^0.19.0
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # Register your assets here
  assets:
    - assets/sounds/number_called.mp3
    - assets/sounds/winner_announced.mp3
    - assets/icon/app_icon.jpg
